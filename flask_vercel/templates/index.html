<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Network Submission Portal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(120deg,#4facfe,#00f2fe);
            margin:0;
            padding:0;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .container{
            background:white;
            padding:30px;
            border-radius:10px;
            width:350px;
            box-shadow:0px 5px 15px rgba(0,0,0,0.2);
            text-align:center;
        }

        h1{
            margin-bottom:10px;
            color:#333;
        }

        p{
            color:#666;
            font-size:14px;
            margin-bottom:20px;
        }

        input[type="text"]{
            width:100%;
            padding:12px;
            border:1px solid #ccc;
            border-radius:5px;
            margin-bottom:15px;
            font-size:15px;
        }

        button{
            width:100%;
            padding:12px;
            background:#4facfe;
            border:none;
            color:white;
            font-size:16px;
            border-radius:5px;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#2b7de9;
        }

        .results-btn{
            margin-top:15px;
            display:inline-block;
            text-decoration:none;
            color:#4facfe;
            font-weight:bold;
        }

        .footer{
            margin-top:20px;
            font-size:12px;
            color:#888;
        }

    </style>
</head>

<body>

<div class="container">

    <h1>Network Form</h1>
    <p>Submit your data to the local server</p>

    <form method="POST">
        <input 
            type="text" 
            name="content" 
            placeholder="Enter your message..." 
            required
        >

        <button type="submit">Send to Server</button>
    </form>

    <a class="results-btn" href="/results">View All Submissions</a>

    <div class="footer">
        Flask Local Network Application
    </div>

</div>

</body>
</html>
